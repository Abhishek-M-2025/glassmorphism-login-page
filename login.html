<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Page</title>

    <link rel="stylesheet" href="./login.css">
</head>
<body>

    <div class="box">

        <h1>Login</h1>

        <form action="">

            <div>
                <label for="name" style="display: block;"></label>
                <input type="text"
                       id="name"
                       placeholder="Username"
                       style="display: block;">
            </div>

            <div>
                <label for="pass" style="display: block;"></label>
                <input type="password"
                       id="pass"
                       placeholder="Password"
                       style="display: block;">
            </div>

            <div class="remember-forgot">

                <label for="remember">
                    <input type="checkbox" id="remember">
                    Remember Me
                </label>

                <a href="#">Forgot Password?</a>

            </div>

            <div class="login">
                <button type="submit">Login</button>
            </div>

        </form>

        <div class="Register">
            <p>Don't have an account? 
                <a href="#">Register</a>
            </p>
            
        </div>

    </div>

</body>
</html>
